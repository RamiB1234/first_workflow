name: My Parallel Workflow

on:
  workflow_dispatch: # for manual trigger
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  #schedule:
  #  - cron: '0 5 * * 1-5'

env:
  # Setting an environment variable with the value of a configuration variable
  debug: ${{ vars.DEBUG }}

# Jobs defined in the workflow
jobs:
  build-and-test-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js 
        uses: actions/setup-node@v3
        with:
          node-version: latest

      - name: Print a message for master branch
        if: github.ref == 'refs/heads/master'
        run: echo "This is the master branch."

      - name: Print a message for non-master branches
        if: github.ref != 'refs/heads/master'
        run: echo "This is not the master branch."

      - name: Run tests
        run: npm test

      - name: Debug message
        if: env.debug == 'true'
        run: echo "Debugging is enabled."

  build-and-test-2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js 
        uses: actions/setup-node@v3
        with:
          node-version: latest

      - name: Print a message for master branch
        if: github.ref == 'refs/heads/master'
        run: echo "This is the master branch."

      - name: Print a message for non-master branches
        if: github.ref != 'refs/heads/master'
        run: echo "This is not the master branch."

      - name: Run tests
        run: npm test

      - name: Debug message
       if: env.debug == 'true'
        run: echo "Debugging is enabled."
  
  post-build-actions:
    # This job will wait for other jobs to be done successfuly 
    needs: [build-and-test-1, build-and-test-2] 
    runs-on: ubuntu-latest
    steps:
    - name: Publish test results
      uses: actions/upload-artifact@v4
      with: 
        name: test-results # Name of the artifact
        path: test-results.xml

